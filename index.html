    <!-- Dynamic theme-color based on color scheme preference -->
    <script>
      (function() {
        // Create theme-color meta tag dynamically (supported by Chrome/Edge/Safari)
        function createThemeColorMeta() {
          let themeColorMeta = document.getElementById('theme-color-meta');
          if (!themeColorMeta) {
            themeColorMeta = document.createElement('meta');
            themeColorMeta.setAttribute('name', 'theme-color');
            themeColorMeta.setAttribute('id', 'theme-color-meta');
            document.head.appendChild(themeColorMeta);
          }
          return themeColorMeta;
        }
        
        function updateThemeColor() {
          const themeColorMeta = createThemeColorMeta();
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          themeColorMeta.setAttribute('content', prefersDark ? '#1e293b' : '#ef4444');
        }
        
        // Set initial theme color
        updateThemeColor();
        
        // Update when color scheme changes
        if (window.matchMedia) {
          window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateThemeColor);
        }
      })();
    </script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          // Register service worker (works on both http://localhost and https://)
          const isLocalhost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
          const shouldRegister = isLocalhost || location.protocol === 'https:';
          
          if (shouldRegister) {
            navigator.serviceWorker.register('/sw.js')
              .then(function(registration) {
                // Service Worker registered successfully
                // Only log in development for debugging
                if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                  console.log('SW registered: ', registration);
                }
              })
              .catch(function(registrationError) {
                // Log error but don't break the app
                // In production, errors should be tracked via error monitoring service
                if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                  console.warn('SW registration failed: ', registrationError);
                }
                // Report to error tracking if available
                if (window.Sentry && typeof window.Sentry.captureException === 'function') {
                  window.Sentry.captureException(registrationError);
                }
              });
          }
        });
      }
    </script>
