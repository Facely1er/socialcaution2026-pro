# Netlify Configuration for Standard Version (app.socialcaution.com)
# Use this config file for the Standard/Full featured site

[build]
  command = "npm run build:standard"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"
  VITE_APP_VERSION = "standard"

# Production deployment with full checks
[context.production]
  command = "npm run deploy:production"
  [context.production.environment]
    VITE_REACT_APP_ENVIRONMENT = "production"
    VITE_APP_MODE = "full"

# Staging deployment
[context.staging]
  command = "npm run deploy:staging"
  [context.staging.environment]
    VITE_REACT_APP_ENVIRONMENT = "staging"
    VITE_APP_MODE = "full"

# Branch deploys
[context.branch-deploy]
  command = "npm run build:standard"
  [context.branch-deploy.environment]
    VITE_REACT_APP_ENVIRONMENT = "development"
    VITE_APP_MODE = "full"

# API routes - proxy to Netlify functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# SPA fallback - all routes go to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.google-analytics.com https://www.googletagmanager.com https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://fonts.gstatic.com https://api.stripe.com https://js.stripe.com https://cdn.simpleicons.org https://krebsonsecurity.com https://privacyrights.org https://www.cisa.gov https://feeds.feedburner.com https://techcrunch.com https://csrc.nist.gov https://www.consumer.ftc.gov https://openphish.com https://apwg.org https://www.eff.org https://thehackernews.com https://bleepingcomputer.com https://threatpost.com https://www.darkreading.com https://portswigger.net https://www.us-cert.gov https://blog.malwarebytes.com https://www.ftc.gov https://www.enforcementtracker.com https://iapp.org https://epic.org https://source.android.com https://www.databreaches.net https://www.socialmediatoday.com https://www.idtheftcenter.org https://www.commonsensemedia.org; frame-src 'self' https://js.stripe.com; base-uri 'self'; form-action 'self'"

# Cache static assets (1 year)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache service worker (no cache)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Don't cache HTML files
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Function configuration
[functions]
  node_bundler = "esbuild"
  included_files = ["netlify/functions/**"]

